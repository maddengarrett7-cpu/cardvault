<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SlabVault — Reset Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --green: #00e676; --bg: #0a0a0a; --surface: #141414; --border: #2a2a2a; --text: #fff; --muted: #888; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 400px; }
    .logo { font-size: 24px; font-weight: 800; margin-bottom: 28px; text-align: center; }
    .logo span { color: var(--green); }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p.sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input { width: 100%; padding: 12px 14px; background: #1e1e1e; border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; margin-bottom: 16px; outline: none; }
    input:focus { border-color: var(--green); }
    button { width: 100%; padding: 13px; background: var(--green); color: #000; font-weight: 800; font-size: 15px; border: none; border-radius: 10px; cursor: pointer; }
    .error { background: #2a1a1a; border: 1px solid #5a2a2a; color: #ff6b6b; padding: 12px 14px; border-radius: 10px; font-size: 14px; margin-bottom: 16px; }
    .success { background: #0a2a1a; border: 1px solid #00e676; color: #00e676; padding: 16px 14px; border-radius: 10px; font-size: 14px; line-height: 1.5; }
    .back { text-align: center; margin-top: 20px; font-size: 14px; color: var(--muted); }
    .back a { color: var(--green); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Card<span>Scan</span></div>

    {% if success %}
    <h1>Password updated!</h1>
    <div class="success" style="margin-top:16px;">✓ Your password has been reset. You can now log in with your new password.</div>
    <div class="back"><a href="/login">Go to login →</a></div>

    {% elif error %}
    <h1>Reset link invalid</h1>
    <div class="error" style="margin-top:16px;">{{ error }}</div>
    <div class="back"><a href="/forgot-password">Request a new link</a></div>

    {% else %}
    <h1>Set a new password</h1>
    <p class="sub">Choose a strong password for your account.</p>
    <form method="POST">
      <label>New password</label>
      <input type="password" name="password" placeholder="At least 6 characters" required autofocus>
      <label>Confirm password</label>
      <input type="password" name="confirm" placeholder="Repeat your password" required>
      <button type="submit">Reset Password</button>
    </form>
    {% endif %}
  </div>
</body>
</html>
