<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CardScan — Something Went Wrong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --green: #00e676; --bg: #0a0a0a; --surface: #141414; --border: #2a2a2a; --text: #fff; --muted: #888; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; text-align: center; }
    .logo { font-size: 22px; font-weight: 800; margin-bottom: 32px; }
    .logo span { color: var(--green); }
    .code { font-size: 72px; font-weight: 900; color: var(--green); line-height: 1; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    p { color: var(--muted); font-size: 15px; margin-bottom: 32px; line-height: 1.6; }
    a { display: inline-block; background: var(--green); color: #000; font-weight: 800; padding: 12px 28px; border-radius: 10px; text-decoration: none; font-size: 15px; }
  </style>
</head>
<body>
  <div>
    <div class="logo">Card<span>Scan</span></div>
    <div class="code">500</div>
    <h1>Something went wrong</h1>
    <p>We hit an unexpected error. It's on our end — try again in a moment.<br>If it keeps happening, reach out to <strong style="color:#fff;">@cardscaniq</strong> on Instagram.</p>
    <a href="/">Go Home</a>
  </div>
</body>
</html>
