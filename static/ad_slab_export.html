<!DOCTYPE html>

<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:1080px; height:1350px; overflow:hidden; background:#0a0a0a; }
.wrap { position:relative; width:1080px; height:1350px; background:linear-gradient(135deg,#0a0a0a,#0d1a0e); font-family:system-ui,-apple-system,sans-serif; overflow:hidden; }
.glow { position:absolute; border-radius:50%; background:#00e676; filter:blur(100px); }
.badge { position:absolute; top:72px; left:72px; background:#00e676; color:#000; font-size:15px; font-weight:900; letter-spacing:1px; padding:8px 24px; border-radius:20px; }
.logo { position:absolute; top:68px; right:72px; font-size:30px; font-weight:900; color:#fff; }
.logo span { color:#00e676; }
.headline { position:absolute; top:160px; left:50%; transform:translateX(-50%); text-align:center; white-space:nowrap; }
.intro { font-size:16px; font-weight:700; color:#888; letter-spacing:5px; display:block; margin-bottom:10px; }
.h1 { font-size:78px; font-weight:900; color:#fff; letter-spacing:-3px; line-height:1; display:block; }
.h2 { font-size:78px; font-weight:900; color:#00e676; letter-spacing:-3px; line-height:1; display:block; text-shadow:0 0 80px rgba(0,230,118,0.5); }
.card-wrap { position:absolute; left:50%; top:400px; transform:translateX(-50%); width:380px; height:570px; border-radius:14px; overflow:hidden; box-shadow:0 40px 100px rgba(0,0,0,0.85); }
.card-wrap img { width:100%; height:100%; object-fit:contain; object-position:center; }
.card-border { position:absolute; inset:0; border-radius:14px; border:2.5px solid rgba(0,230,118,0.5); pointer-events:none; }
.scan-line { position:absolute; top:278px; left:0; right:0; height:3px; background:#00e676; box-shadow:0 0 20px #00e676, 0 0 50px rgba(0,230,118,0.4); }
.beam { position:absolute; inset:0; background:linear-gradient(180deg,transparent 30%,rgba(0,230,118,0.1) 50%,transparent 70%); }
.bracket { position:absolute; border-color:#00e676; border-style:solid; width:30px; height:30px; }
.tl { top:16px; left:16px; border-width:3px 0 0 3px; }
.tr { top:16px; right:16px; border-width:3px 3px 0 0; }
.bl { bottom:16px; left:16px; border-width:0 0 3px 3px; }
.br { bottom:16px; right:16px; border-width:0 3px 3px 0; }
.panel { position:absolute; bottom:72px; left:72px; right:72px; background:#141414; border:1.5px solid #2a2a2a; border-radius:18px; padding:22px 32px 26px; }
.panel-bar { position:absolute; top:0; left:0; right:0; height:4px; background:#00e676; border-radius:18px 18px 0 0; }
.ai-label { font-size:11px; font-weight:700; color:#555; letter-spacing:1.5px; margin-bottom:14px; }
.fields { display:flex; gap:0; align-items:flex-start; }
.field { flex:1; }
.field-label { font-size:12px; color:#888; margin-bottom:4px; }
.field-val { font-size:17px; font-weight:800; color:#fff; }
.field-val.green { color:#00e676; }
.grade-badge { background:#0d1f0d; border:1.5px solid #00e676; border-radius:10px; padding:10px 20px; font-size:22px; font-weight:900; color:#00e676; white-space:nowrap; align-self:center; }
.footer { position:absolute; bottom:28px; left:50%; transform:translateX(-50%); font-size:16px; font-weight:700; color:#2a2a2a; }
</style>
