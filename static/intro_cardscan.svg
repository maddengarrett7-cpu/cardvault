<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="100%" style="stop-color:#0c1a0d"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#111"/>
    </linearGradient>
    <linearGradient id="scanBeam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00e676" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardshadow">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="panelshadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg)"/>

  <!-- Dot grid -->
  <g opacity="0.04">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#00e676"/>
    </pattern>
    <rect width="1080" height="1350" fill="url(#dots)"/>
  </g>

  <!-- Ambient bloom -->
  <ellipse cx="540" cy="600" rx="520" ry="400" fill="#00e676" opacity="0.022"/>
  <ellipse cx="540" cy="600" rx="260" ry="200" fill="#00e676" opacity="0.022"/>

  <!-- ── LOGO / TOP BAR ── -->
  <text x="64" y="92" fill="#fff" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="900" letter-spacing="-0.5">Card<tspan fill="#00e676">Scan</tspan></text>
  <text x="64" y="120" fill="#333" font-family="system-ui,-apple-system,sans-serif" font-size="15">cardscan.live</text>

  <rect x="800" y="68" width="216" height="38" rx="19" fill="#0d1f0d" stroke="#00e676" stroke-width="1.2"/>
  <text x="908" y="91" text-anchor="middle" fill="#00e676" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700">AI-Powered Scanning</text>

  <!-- ── HEADLINE ── -->
  <text x="540" y="196" text-anchor="middle" fill="#fff" font-family="system-ui,-apple-system,sans-serif" font-size="78" font-weight="900" letter-spacing="-3">What is</text>
  <text x="540" y="282" text-anchor="middle" fill="#00e676" font-family="system-ui,-apple-system,sans-serif" font-size="78" font-weight="900" letter-spacing="-3" filter="url(#bigglow)">CardScan?</text>

  <text x="540" y="334" text-anchor="middle" fill="#666" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="400">Point your camera. Walk away with a full catalog.</text>

  <!-- ── CARD MOCKUP (centered, larger) ── -->
  <g transform="translate(390, 370)" filter="url(#cardshadow)">
    <rect width="300" height="430" rx="16" fill="url(#cardGrad)" stroke="#2a2a2a" stroke-width="1.5"/>

    <!-- Top band -->
    <rect x="0" y="0" width="300" height="80" rx="16" fill="#1c2a1c"/>
    <rect x="0" y="64" width="300" height="16" fill="#1c2a1c"/>

    <!-- Player area -->
    <rect x="22" y="90" width="256" height="230" rx="8" fill="#161616"/>

    <!-- Silhouette -->
    <ellipse cx="150" cy="138" rx="32" ry="34" fill="#222"/>
    <path d="M88 318 Q100 228 150 222 Q200 228 212 318 Z" fill="#222"/>
    <path d="M88 318 Q64 282 80 258 Q96 240 120 252" fill="none" stroke="#222" stroke-width="18" stroke-linecap="round"/>
    <path d="M212 318 Q236 282 220 258 Q204 240 180 252" fill="none" stroke="#222" stroke-width="18" stroke-linecap="round"/>

    <!-- Card info bottom -->
    <rect x="22" y="336" width="256" height="14" rx="5" fill="#222"/>
    <rect x="22" y="358" width="160" height="12" rx="4" fill="#1e1e1e"/>
    <rect x="22" y="378" width="110" height="12" rx="4" fill="#1e1e1e"/>
    <text x="278" y="410" text-anchor="end" fill="#2a2a2a" font-family="system-ui" font-size="11">#/99</text>

    <!-- Card label top -->
    <text x="150" y="34" text-anchor="middle" fill="#00e676" font-family="system-ui" font-size="12" font-weight="800" letter-spacing="3" opacity="0.75">PRIZM</text>
    <text x="150" y="58" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="17" font-weight="900">STEPHEN CURRY</text>

    <!-- Scan beam -->
    <rect x="0" y="115" width="300" height="205" fill="url(#scanBeam)" rx="4"/>
    <line x1="0" y1="218" x2="300" y2="218" stroke="#00e676" stroke-width="3" filter="url(#glow)" opacity="0.95"/>

    <!-- Corner brackets -->
    <path d="M0 36 L0 0 L36 0" fill="none" stroke="#00e676" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M264 0 L300 0 L300 36" fill="none" stroke="#00e676" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M0 394 L0 430 L36 430" fill="none" stroke="#00e676" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M264 430 L300 430 L300 394" fill="none" stroke="#00e676" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  </g>

  <!-- ── RESULTS PANEL (below card) ── -->
  <g transform="translate(64, 850)" filter="url(#panelshadow)">
    <rect width="952" height="300" rx="18" fill="#111" stroke="#222" stroke-width="1.5"/>

    <!-- Panel header -->
    <rect width="952" height="52" rx="18" fill="#141414"/>
    <rect y="36" width="952" height="16" fill="#141414"/>
    <circle cx="24" cy="26" r="7" fill="#282828"/>
    <circle cx="48" cy="26" r="7" fill="#282828"/>
    <circle cx="72" cy="26" r="7" fill="#282828"/>
    <text x="476" y="32" text-anchor="middle" fill="#444" font-family="system-ui" font-size="12">Card Result</text>

    <line x1="0" y1="52" x2="952" y2="52" stroke="#1e1e1e" stroke-width="1"/>

    <!-- AI identified badge -->
    <rect x="18" y="66" width="118" height="24" rx="12" fill="#0d1f0d" stroke="#00e676" stroke-width="1"/>
    <text x="77" y="82" text-anchor="middle" fill="#00e676" font-family="system-ui" font-size="11" font-weight="800">✓  AI IDENTIFIED</text>

    <!-- Player name + set -->
    <text x="18" y="126" fill="#fff" font-family="system-ui" font-size="26" font-weight="900">Stephen Curry</text>
    <text x="18" y="154" fill="#777" font-family="system-ui" font-size="15">2021-22 Panini Prizm Silver · #/99</text>

    <line x1="18" y1="172" x2="934" y2="172" stroke="#1a1a1a" stroke-width="1"/>

    <!-- Fields row 1 -->
    <text x="18" y="198" fill="#444" font-family="system-ui" font-size="11" font-weight="700" letter-spacing="0.5">YEAR</text>
    <text x="18" y="220" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">2021</text>

    <text x="148" y="198" fill="#444" font-family="system-ui" font-size="11" font-weight="700" letter-spacing="0.5">SET</text>
    <text x="148" y="220" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">Prizm</text>

    <text x="278" y="198" fill="#444" font-family="system-ui" font-size="11" font-weight="700" letter-spacing="0.5">PARALLEL</text>
    <text x="278" y="220" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">Silver</text>

    <text x="458" y="198" fill="#444" font-family="system-ui" font-size="11" font-weight="700" letter-spacing="0.5">SERIAL</text>
    <text x="458" y="220" fill="#00e676" font-family="system-ui" font-size="16" font-weight="700">/99</text>

    <text x="598" y="198" fill="#444" font-family="system-ui" font-size="11" font-weight="700" letter-spacing="0.5">GRADE</text>
    <text x="598" y="220" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">Raw</text>

    <text x="728" y="198" fill="#444" font-family="system-ui" font-size="11" font-weight="700" letter-spacing="0.5">EST. VALUE</text>
    <text x="728" y="220" fill="#00e676" font-family="system-ui" font-size="18" font-weight="800" filter="url(#glow)">~$140</text>

    <!-- Add to collection button -->
    <rect x="18" y="242" width="916" height="38" rx="19" fill="#00e676"/>
    <text x="476" y="266" text-anchor="middle" fill="#000" font-family="system-ui" font-size="15" font-weight="900">+ Add to Collection</text>
  </g>

  <!-- ── HOW IT WORKS — 4 STEPS ── -->
  <g transform="translate(64, 1196)">

    <!-- Step 1 -->
    <g>
      <circle cx="60" cy="30" r="30" fill="#0d1f0d" stroke="#00e676" stroke-width="1.5"/>
      <text x="60" y="20" text-anchor="middle" fill="#00e676" font-family="system-ui" font-size="22">📷</text>
      <text x="60" y="38" text-anchor="middle" fill="#00e676" font-family="system-ui" font-size="8" font-weight="800">STEP 1</text>
      <text x="60" y="80" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="800">Snap a Photo</text>
      <text x="60" y="98" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">Any card, any angle</text>
    </g>

    <line x1="104" y1="30" x2="174" y2="30" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,4"/>
    <polygon points="174,25 184,30 174,35" fill="#333"/>

    <!-- Step 2 -->
    <g transform="translate(200, 0)">
      <circle cx="60" cy="30" r="30" fill="#0d1f0d" stroke="#00e676" stroke-width="1.5"/>
      <text x="60" y="20" text-anchor="middle" fill="#00e676" font-family="system-ui" font-size="22">🤖</text>
      <text x="60" y="38" text-anchor="middle" fill="#00e676" font-family="system-ui" font-size="8" font-weight="800">STEP 2</text>
      <text x="60" y="80" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="800">AI Reads It</text>
      <text x="60" y="98" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">Player, year, set, serial</text>
    </g>

    <line x1="304" y1="30" x2="374" y2="30" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,4"/>
    <polygon points="374,25 384,30 374,35" fill="#333"/>

    <!-- Step 3 -->
    <g transform="translate(400, 0)">
      <circle cx="60" cy="30" r="30" fill="#0d1f0d" stroke="#00e676" stroke-width="1.5"/>
      <text x="60" y="20" text-anchor="middle" fill="#00e676" font-family="system-ui" font-size="22">📋</text>
      <text x="60" y="38" text-anchor="middle" fill="#00e676" font-family="system-ui" font-size="8" font-weight="800">STEP 3</text>
      <text x="60" y="80" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="800">Logged to Sheets</text>
      <text x="60" y="98" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">Auto-organized</text>
    </g>

    <line x1="504" y1="30" x2="574" y2="30" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,4"/>
    <polygon points="574,25 584,30 574,35" fill="#333"/>

    <!-- Step 4 -->
    <g transform="translate(600, 0)">
      <circle cx="60" cy="30" r="30" fill="#0a2a14" stroke="#00e676" stroke-width="2" filter="url(#glow)"/>
      <text x="60" y="22" text-anchor="middle" fill="#00e676" font-family="system-ui" font-size="22" filter="url(#glow)">✓</text>
      <text x="60" y="38" text-anchor="middle" fill="#00e676" font-family="system-ui" font-size="8" font-weight="800">DONE</text>
      <text x="60" y="80" text-anchor="middle" fill="#00e676" font-family="system-ui" font-size="14" font-weight="800">Collection Built</text>
      <text x="60" y="98" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">No typing. Ever.</text>
    </g>
  </g>

  <!-- ── BOTTOM BAR ── -->
  <rect x="64" y="1308" width="952" height="26" rx="13" fill="#0d1f0d" stroke="#1a1a1a" stroke-width="1"/>
  <text x="540" y="1326" text-anchor="middle" fill="#00e676" font-family="system-ui" font-size="12" font-weight="700" letter-spacing="1">cardscan.live  ·  Bulk Scan  ·  Gemini AI  ·  No Manual Entry</text>
</svg>
